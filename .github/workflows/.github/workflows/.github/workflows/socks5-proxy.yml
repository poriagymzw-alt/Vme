name: SOCKS5 Proxy - Quick Cloudflare Tunnel (بدون Domain)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'مدت زمان اجرا (مثلاً 1h یا 2h)'
        required: true
        default: '2h'

jobs:
  proxy:
    runs-on: ubuntu-latest

    steps:
      - name: Install cloudflared + Chisel
        run: |
          # cloudflared
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

          # Chisel (SOCKS5)
          wget https://github.com/jpillora/chisel/releases/download/v1.10.0/chisel_1.10.0_linux_amd64.deb
          sudo dpkg -i chisel_1.10.0_linux_amd64.deb

      - name: Run Quick Tunnel + SOCKS5 Proxy
        run: |
          echo "🚀 شروع Quick Tunnel + Chisel SOCKS5..."
          
          timeout ${{ github.event.inputs.duration }} bash -c '
            # Quick Tunnel (آدرس عمومی خودش چاپ می‌کنه)
            cloudflared tunnel --url http://localhost:8080 > /tmp/tunnel.log 2>&1 &
            TUNNEL_PID=$!
            
            # صبر کوتاه تا تونل آماده بشه
            sleep 10
            
            # آدرس تونل رو واضح چاپ کن
            echo "=== آدرس تونل آماده ==="
            grep -o "https://[^ ]*\.trycloudflare\.com" /tmp/tunnel.log || echo "آدرس در لاگ کامل پیدا نشد (اسکرول بالا رو چک کن)"
            cat /tmp/tunnel.log | tail -20
            
            # Chisel SOCKS5 Server
            chisel server --socks5 --port 8080 &
            CHISEL_PID=$!
            
            wait $TUNNEL_PID $CHISEL_PID
          ' || true
